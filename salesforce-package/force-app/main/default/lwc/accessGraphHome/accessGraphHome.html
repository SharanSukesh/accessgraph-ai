<template>
    <lightning-card title="AccessGraph AI" icon-name="standard:lightning_usage">

        <!-- Loading state -->
        <template if:true={isLoading}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
            </div>
        </template>

        <!-- Loaded state -->
        <template if:false={isLoading}>

            <!-- Header bar: connection + last sync -->
            <div class="slds-p-horizontal_medium slds-p-bottom_small slds-grid slds-grid_align-spread slds-wrap">
                <div class="slds-col">
                    <lightning-badge label={connectionBadgeLabel} class={connectionBadgeVariant}></lightning-badge>
                </div>
                <template if:true={hasLastSync}>
                    <div class="slds-col slds-text-align_right">
                        <span class="slds-text-body_small slds-text-color_weak">Last sync: </span>
                        <lightning-formatted-date-time
                            value={summary.lastSyncDate}
                            year="numeric" month="short" day="2-digit"
                            hour="2-digit" minute="2-digit">
                        </lightning-formatted-date-time>
                        <span class="slds-m-left_x-small">
                            <lightning-badge label={lastSyncStatusLabel}></lightning-badge>
                        </span>
                    </div>
                </template>
            </div>

            <!-- Backend unreachable banner -->
            <template if:false={backendReachable}>
                <div class="slds-p-horizontal_medium slds-p-bottom_small">
                    <div class="slds-notify slds-notify_alert slds-alert_warning" role="alert">
                        <span class="slds-assistive-text">warning</span>
                        <h2>The AccessGraph AI backend is not reachable. Cached data may be stale. Try again in a moment.</h2>
                    </div>
                </div>
            </template>

            <!-- Insights tiles: anomalies, recommendations, sync status -->
            <div class="slds-grid slds-gutters slds-p-horizontal_medium slds-wrap">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-bottom_small">
                    <div class="ag-tile ag-tile-warn slds-box slds-box_small slds-text-align_center">
                        <p class="slds-text-heading_label slds-text-color_weak">Anomalies</p>
                        <p class="ag-tile-number slds-text-heading_large">{anomalyCount}</p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-bottom_small">
                    <div class="ag-tile ag-tile-info slds-box slds-box_small slds-text-align_center">
                        <p class="slds-text-heading_label slds-text-color_weak">Recommendations</p>
                        <p class="ag-tile-number slds-text-heading_large">{recommendationCount}</p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-bottom_small">
                    <div class="ag-tile slds-box slds-box_small slds-text-align_center">
                        <p class="slds-text-heading_label slds-text-color_weak">Last Sync</p>
                        <p class="ag-tile-status slds-text-heading_medium">{lastSyncStatusLabel}</p>
                    </div>
                </div>
            </div>

            <!-- Sync coverage: per-entity counts from the latest sync -->
            <template if:true={hasSyncedData}>
                <div class="slds-p-horizontal_medium slds-p-top_small slds-p-bottom_x-small">
                    <p class="slds-text-heading_small slds-text-color_default slds-m-bottom_x-small">
                        Synced from Salesforce
                    </p>
                </div>
                <div class="slds-grid slds-gutters_small slds-p-horizontal_medium slds-wrap">
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5 slds-p-bottom_x-small">
                        <div class="ag-mini-tile slds-box slds-box_x-small slds-text-align_center">
                            <p class="ag-mini-number">{userCount}</p>
                            <p class="ag-mini-label">Users</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5 slds-p-bottom_x-small">
                        <div class="ag-mini-tile slds-box slds-box_x-small slds-text-align_center">
                            <p class="ag-mini-number">{profileCount}</p>
                            <p class="ag-mini-label">Profiles</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5 slds-p-bottom_x-small">
                        <div class="ag-mini-tile slds-box slds-box_x-small slds-text-align_center">
                            <p class="ag-mini-number">{permissionSetCount}</p>
                            <p class="ag-mini-label">Perm Sets</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5 slds-p-bottom_x-small">
                        <div class="ag-mini-tile slds-box slds-box_x-small slds-text-align_center">
                            <p class="ag-mini-number">{objectPermissionCountFormatted}</p>
                            <p class="ag-mini-label">Object Perms</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5 slds-p-bottom_x-small">
                        <div class="ag-mini-tile slds-box slds-box_x-small slds-text-align_center">
                            <p class="ag-mini-number">{fieldPermissionCountFormatted}</p>
                            <p class="ag-mini-label">Field Perms</p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Action buttons -->
            <div class="slds-p-around_medium slds-grid slds-grid_align-center slds-wrap">
                <lightning-button
                    variant="brand"
                    label="Sync Now"
                    icon-name="utility:sync"
                    onclick={handleSyncClick}
                    disabled={syncing}
                    class="slds-m-right_small slds-m-bottom_x-small">
                </lightning-button>

                <lightning-button
                    variant="neutral"
                    label="Open Full Dashboard"
                    icon-name="utility:new_window"
                    icon-position="right"
                    onclick={handleOpenDashboard}
                    class="slds-m-bottom_x-small">
                </lightning-button>

                <template if:true={syncing}>
                    <div class="slds-m-left_small slds-align-middle">
                        <lightning-spinner alternative-text="Syncing..." size="small" variant="brand"></lightning-spinner>
                    </div>
                </template>
            </div>

            <!-- Footer hint -->
            <div class="slds-p-horizontal_medium slds-p-bottom_medium slds-text-align_center">
                <p class="slds-text-body_small slds-text-color_weak">
                    For detailed analysis, anomaly investigation, and access graph visualization, use the full dashboard.
                </p>
            </div>

        </template>
    </lightning-card>
</template>
