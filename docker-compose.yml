version: '3.9'

services:
  # ==============================================
  # PostgreSQL - Primary Database
  # ==============================================
  postgres:
    image: postgres:16-alpine
    container_name: accessgraph-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accessgraph}
      POSTGRES_USER: ${POSTGRES_USER:-accessgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accessgraph}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accessgraph-network
    restart: unless-stopped

  # ==============================================
  # Neo4j - Graph Database
  # ==============================================
  neo4j:
    image: neo4j:5.16-community
    container_name: accessgraph-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change_me_in_production}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-change_me_in_production} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - accessgraph-network
    restart: unless-stopped

  # ==============================================
  # Redis - Cache & Queue
  # ==============================================
  redis:
    image: redis:7-alpine
    container_name: accessgraph-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - accessgraph-network
    restart: unless-stopped

  # ==============================================
  # Backend - FastAPI Service
  # ==============================================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: accessgraph-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-accessgraph}:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/${POSTGRES_DB:-accessgraph}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change_me_in_production}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_RELOAD: ${BACKEND_RELOAD:-true}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
      - backend_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - accessgraph-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ==============================================
  # Frontend - Next.js Application
  # ==============================================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: accessgraph-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AccessGraph AI}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - accessgraph-network
    restart: unless-stopped
    command: npm run dev

# ==============================================
# Networks
# ==============================================
networks:
  accessgraph-network:
    driver: bridge

# ==============================================
# Volumes
# ==============================================
volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  redis_data:
    driver: local
  backend_cache:
    driver: local
