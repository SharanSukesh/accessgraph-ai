<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer vertices -->
  <circle cx="50" cy="10" r="6" fill="#8b5cf6"/>
  <circle cx="15" cy="30" r="6" fill="#8b5cf6"/>
  <circle cx="85" cy="30" r="6" fill="#8b5cf6"/>
  <circle cx="15" cy="70" r="6" fill="#8b5cf6"/>
  <circle cx="85" cy="70" r="6" fill="#8b5cf6"/>
  <circle cx="50" cy="90" r="6" fill="#8b5cf6"/>

  <!-- Center vertex -->
  <circle cx="50" cy="50" r="8" fill="#7c3aed"/>

  <!-- Edges - top face -->
  <line x1="50" y1="10" x2="15" y2="30" stroke="#8b5cf6" stroke-width="3"/>
  <line x1="50" y1="10" x2="85" y2="30" stroke="#8b5cf6" stroke-width="3"/>
  <line x1="15" y1="30" x2="85" y2="30" stroke="#8b5cf6" stroke-width="3"/>

  <!-- Edges - bottom face -->
  <line x1="50" y1="90" x2="15" y2="70" stroke="#8b5cf6" stroke-width="3"/>
  <line x1="50" y1="90" x2="85" y2="70" stroke="#8b5cf6" stroke-width="3"/>
  <line x1="15" y1="70" x2="85" y2="70" stroke="#8b5cf6" stroke-width="3"/>

  <!-- Vertical edges -->
  <line x1="15" y1="30" x2="15" y2="70" stroke="#8b5cf6" stroke-width="3"/>
  <line x1="85" y1="30" x2="85" y2="70" stroke="#8b5cf6" stroke-width="3"/>

  <!-- Center connections -->
  <line x1="50" y1="10" x2="50" y2="50" stroke="#7c3aed" stroke-width="3"/>
  <line x1="50" y1="90" x2="50" y2="50" stroke="#7c3aed" stroke-width="3"/>
  <line x1="15" y1="30" x2="50" y2="50" stroke="#7c3aed" stroke-width="3"/>
  <line x1="85" y1="30" x2="50" y2="50" stroke="#7c3aed" stroke-width="3"/>
  <line x1="15" y1="70" x2="50" y2="50" stroke="#7c3aed" stroke-width="3"/>
  <line x1="85" y1="70" x2="50" y2="50" stroke="#7c3aed" stroke-width="3"/>
</svg>
